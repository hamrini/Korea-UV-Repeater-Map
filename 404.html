<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>cqcq.kr 으로 이동합니다</title>
    <script>
      // 구 GitHub Pages 의 모든 경로 (예: /r/DS0KBU?z=10) 를 새 도메인으로
      // 그대로 옮긴다. SPA 딥링크 보존.
      (function () {
        var loc = window.location;
        var path = loc.pathname.replace(/^\/Korea-UV-Repeater-Map(?=\/|$)/, '') || '/';
        loc.replace('https://cqcq.kr' + path + loc.search + loc.hash);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=https://cqcq.kr/" />
  </head>
  <body>
    <p>Redirecting to <a href="https://cqcq.kr/">cqcq.kr</a> …</p>
  </body>
</html>
